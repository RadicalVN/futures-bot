version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  trading-bot:
    build: .
    container_name: binance-futures-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data        # Backtest Excel persistence
      - ./logs:/app/logs        # Log persistence
      - ./.env:/app/.env:ro     # API keys (read-only)
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env

volumes:
  postgres_data:
