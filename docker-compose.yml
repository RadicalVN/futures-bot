version: "3.8"

services:
  trading-bot:
    build: .
    container_name: binance-futures-bot
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data        # Database persistence
      - ./logs:/app/logs        # Log persistence
      - ./.env:/app/.env:ro     # API keys (read-only)
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env

  # Optional: Nginx reverse proxy (bỏ comment khi dùng VPS với domain)
